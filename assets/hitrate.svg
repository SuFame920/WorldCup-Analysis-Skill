<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 340" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif">
  <rect x="2" y="2" width="816" height="336" rx="12" fill="#ffffff" stroke="#e5e7eb"/>
  <text x="24" y="28" font-size="15" font-weight="700" fill="#1f2328">近 7 日命中率趋势（30场已结算 · 分项命中率 · 6条曲线）</text>

  <!-- legend -->
  <rect x="320" y="17" width="12" height="12" rx="2" fill="#2563eb"/>
  <text x="337" y="28" font-size="11" fill="#374151">整体</text>
  <rect x="380" y="17" width="12" height="12" rx="2" fill="#dc2626"/>
  <text x="397" y="28" font-size="11" fill="#374151">胜平负</text>
  <rect x="452" y="17" width="12" height="12" rx="2" fill="#16a34a"/>
  <text x="469" y="28" font-size="11" fill="#374151">让球</text>
  <rect x="510" y="17" width="12" height="12" rx="2" fill="#f59e0b"/>
  <text x="527" y="28" font-size="11" fill="#374151">比分</text>
  <rect x="572" y="17" width="12" height="12" rx="2" fill="#8b5cf6"/>
  <text x="589" y="28" font-size="11" fill="#374151">大小球</text>
  <rect x="645" y="17" width="12" height="12" rx="2" fill="#06b6d4"/>
  <text x="662" y="28" font-size="11" fill="#374151">半全场</text>

  <!-- y gridlines + labels -->
  <g stroke="#eef0f2" stroke-width="1">
    <line x1="58" y1="50"  x2="762" y2="50"/>
    <line x1="58" y1="100" x2="762" y2="100"/>
    <line x1="58" y1="150" x2="762" y2="150"/>
    <line x1="58" y1="200" x2="762" y2="200"/>
    <line x1="58" y1="250" x2="762" y2="250"/>
    <line x1="58" y1="300" x2="762" y2="300"/>
  </g>
  <g font-size="11" fill="#9ca3af" text-anchor="end">
    <text x="50" y="54">100%</text>
    <text x="50" y="104">80%</text>
    <text x="50" y="154">60%</text>
    <text x="50" y="204">40%</text>
    <text x="50" y="254">20%</text>
    <text x="50" y="304">0%</text>
  </g>

  <!-- x day labels -->
  <g font-size="11" fill="#9ca3af" text-anchor="middle">
    <text x="100" y="320">06-21</text>
    <text x="210" y="320">06-22</text>
    <text x="320" y="320">06-23</text>
    <text x="430" y="320">06-24</text>
    <text x="540" y="320">06-25</text>
    <text x="650" y="320">06-26</text>
  </g>

  <!-- ===== 整体 分项 (blue #2563eb): 45%→70%→55%→53%→60%→77% ===== -->
  <polyline points="100,184 210,122 320,160 430,165 540,148 650,106" fill="none" stroke="#2563eb" stroke-width="2.8"/>
  <circle cx="100" cy="184" r="4" fill="#2563eb"/>
  <circle cx="210" cy="122" r="4" fill="#2563eb"/>
  <circle cx="320" cy="160" r="4" fill="#2563eb"/>
  <circle cx="430" cy="165" r="4" fill="#2563eb"/>
  <circle cx="540" cy="148" r="4" fill="#2563eb"/>
  <circle cx="650" cy="106" r="4" fill="#2563eb"/>
  <!-- labels: 45%, 70%, 55%, 53%, 60%, 77% -->
  <text x="100" y="172" font-size="9" font-weight="600" fill="#1d4ed8" text-anchor="middle">45%</text>
  <text x="210" y="110" font-size="9" font-weight="600" fill="#1d4ed8" text-anchor="middle">70%</text>
  <text x="320" y="148" font-size="9" font-weight="600" fill="#1d4ed8" text-anchor="middle">55%</text>
  <text x="430" y="153" font-size="9" font-weight="600" fill="#1d4ed8" text-anchor="middle">53%</text>
  <text x="540" y="136" font-size="9" font-weight="600" fill="#1d4ed8" text-anchor="middle">60%</text>
  <text x="650" y="94"  font-size="9" font-weight="600" fill="#1d4ed8" text-anchor="middle">77%</text>

  <!-- ===== 胜平负 (red #dc2626): 50%→100%→75%→83%→83%→100% ===== -->
  <!-- 0%=304, 25%=241, 50%=178, 75%=115, 100%=52 -->
  <polyline points="100,178 210,52 320,115 430,95 540,95 650,52" fill="none" stroke="#dc2626" stroke-width="2"/>
  <circle cx="100" cy="178" r="3.5" fill="#dc2626"/>
  <circle cx="210" cy="52"  r="3.5" fill="#dc2626"/>
  <circle cx="320" cy="115" r="3.5" fill="#dc2626"/>
  <circle cx="430" cy="95"  r="3.5" fill="#dc2626"/>
  <circle cx="540" cy="95"  r="3.5" fill="#dc2626"/>
  <circle cx="650" cy="52"  r="3.5" fill="#dc2626"/>

  <!-- ===== 让球 (green #16a34a): 50%→100%→75%→100%→100%→100% ===== -->
  <polyline points="100,178 210,52 320,115 430,52 540,52 650,52" fill="none" stroke="#16a34a" stroke-width="2"/>
  <circle cx="100" cy="178" r="3.5" fill="#16a34a"/>
  <circle cx="210" cy="52"  r="3.5" fill="#16a34a"/>
  <circle cx="320" cy="115" r="3.5" fill="#16a34a"/>
  <circle cx="430" cy="52"  r="3.5" fill="#16a34a"/>
  <circle cx="540" cy="52"  r="3.5" fill="#16a34a"/>
  <circle cx="650" cy="52"  r="3.5" fill="#16a34a"/>

  <!-- ===== 比分 (amber #f59e0b): 0%→75%→50%→50%→33%→33% ===== -->
  <polyline points="100,304 210,115 320,178 430,178 540,220 650,220" fill="none" stroke="#f59e0b" stroke-width="2"/>
  <circle cx="100" cy="304" r="3.5" fill="#f59e0b"/>
  <circle cx="210" cy="115" r="3.5" fill="#f59e0b"/>
  <circle cx="320" cy="178" r="3.5" fill="#f59e0b"/>
  <circle cx="430" cy="178" r="3.5" fill="#f59e0b"/>
  <circle cx="540" cy="220" r="3.5" fill="#f59e0b"/>
  <circle cx="650" cy="220" r="3.5" fill="#f59e0b"/>

  <!-- ===== 大小球 (purple #8b5cf6): 25%→50%→50%→33%→50%→50% ===== -->
  <polyline points="100,241 210,178 320,178 430,220 540,178 650,178" fill="none" stroke="#8b5cf6" stroke-width="2"/>
  <circle cx="100" cy="241" r="3.5" fill="#8b5cf6"/>
  <circle cx="210" cy="178" r="3.5" fill="#8b5cf6"/>
  <circle cx="320" cy="178" r="3.5" fill="#8b5cf6"/>
  <circle cx="430" cy="220" r="3.5" fill="#8b5cf6"/>
  <circle cx="540" cy="178" r="3.5" fill="#8b5cf6"/>
  <circle cx="650" cy="178" r="3.5" fill="#8b5cf6"/>

  <!-- ===== 半全场 (cyan #06b6d4): 25%→50%→50%→83%→50%→100% ===== -->
  <polyline points="100,241 210,178 320,178 430,95 540,178 650,52" fill="none" stroke="#06b6d4" stroke-width="2"/>
  <circle cx="100" cy="241" r="3.5" fill="#06b6d4"/>
  <circle cx="210" cy="178" r="3.5" fill="#06b6d4"/>
  <circle cx="320" cy="178" r="3.5" fill="#06b6d4"/>
  <circle cx="430" cy="95"  r="3.5" fill="#06b6d4"/>
  <circle cx="540" cy="178" r="3.5" fill="#06b6d4"/>
  <circle cx="650" cy="52"  r="3.5" fill="#06b6d4"/>

  <!-- batch labels -->
  <text x="100" y="334" font-size="9" fill="#9ca3af" text-anchor="middle">v1.0 (4场)</text>
  <text x="210" y="334" font-size="9" fill="#9ca3af" text-anchor="middle">v1.1 (4场)</text>
  <text x="320" y="334" font-size="9" fill="#9ca3af" text-anchor="middle">v1.2 (4场)</text>
  <text x="430" y="334" font-size="9" fill="#9ca3af" text-anchor="middle">v1.3 (6场)</text>
  <text x="540" y="334" font-size="9" fill="#9ca3af" text-anchor="middle">v1.5 (6场)</text>
  <text x="650" y="334" font-size="9" fill="#9ca3af" text-anchor="middle">v1.6 (6场)</text>
</svg>
