<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 296" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif">
  <rect x="2" y="2" width="816" height="292" rx="12" fill="#ffffff" stroke="#e5e7eb"/>
  <text x="24" y="28" font-size="15" font-weight="700" fill="#1f2328">近 7 日命中率趋势（30场已结算 · batch级累计）</text>

  <!-- legend -->
  <rect x="620" y="17" width="14" height="14" rx="3" fill="#2563eb"/>
  <text x="639" y="28" font-size="12" fill="#374151">分项</text>
  <rect x="704" y="17" width="14" height="14" rx="3" fill="#f59e0b"/>
  <text x="723" y="28" font-size="12" fill="#374151">逐档</text>

  <!-- y gridlines + labels -->
  <g stroke="#eef0f2" stroke-width="1">
    <line x1="58" y1="50"  x2="762" y2="50"/>
    <line x1="58" y1="100" x2="762" y2="100"/>
    <line x1="58" y1="150" x2="762" y2="150"/>
    <line x1="58" y1="200" x2="762" y2="200"/>
    <line x1="58" y1="250" x2="762" y2="250"/>
  </g>
  <g font-size="11" fill="#9ca3af" text-anchor="end">
    <text x="50" y="54">100%</text>
    <text x="50" y="104">75%</text>
    <text x="50" y="154">50%</text>
    <text x="50" y="204">25%</text>
    <text x="50" y="254">0%</text>
  </g>

  <!-- x day labels -->
  <g font-size="11" fill="#9ca3af" text-anchor="middle">
    <text x="100"   y="270">06-20</text>
    <text x="210"   y="270">06-21</text>
    <text x="320"   y="270">06-22</text>
    <text x="430"   y="270">06-23</text>
    <text x="540"   y="270">06-24</text>
    <text x="650"   y="270">06-25</text>
    <text x="760"   y="270">06-26</text>
  </g>

  <!-- 逐档 line: v1.0 24% → v1.1 47% → v1.2 35% → v1.3 28% → v1.5 32% → v1.6 36% -->
  <polyline points="100,202 210,156 320,180 430,194 540,186 650,178" fill="none" stroke="#f59e0b" stroke-width="2.5"/>
  <circle cx="100" cy="202" r="4" fill="#f59e0b"/>
  <circle cx="210" cy="156" r="4" fill="#f59e0b"/>
  <circle cx="320" cy="180" r="4" fill="#f59e0b"/>
  <circle cx="430" cy="194" r="4" fill="#f59e0b"/>
  <circle cx="540" cy="186" r="4" fill="#f59e0b"/>
  <circle cx="650" cy="178" r="4" fill="#f59e0b"/>
  <text x="100" y="214" font-size="11" font-weight="600" fill="#b45309" text-anchor="middle">24%</text>
  <text x="210" y="168" font-size="11" font-weight="600" fill="#b45309" text-anchor="middle">47%</text>
  <text x="320" y="192" font-size="11" font-weight="600" fill="#b45309" text-anchor="middle">35%</text>
  <text x="430" y="206" font-size="11" font-weight="600" fill="#b45309" text-anchor="middle">28%</text>
  <text x="540" y="198" font-size="11" font-weight="600" fill="#b45309" text-anchor="middle">32%</text>
  <text x="650" y="190" font-size="11" font-weight="600" fill="#b45309" text-anchor="middle">36%</text>

  <!-- 分项 line: v1.0 45% → v1.1 70% → v1.2 55% → v1.3 53% → v1.5 60% → v1.6 77% -->
  <polyline points="100,160 210,110 320,140 430,144 540,130 650,96" fill="none" stroke="#2563eb" stroke-width="2.5"/>
  <circle cx="100" cy="160" r="4" fill="#2563eb"/>
  <circle cx="210" cy="110" r="4" fill="#2563eb"/>
  <circle cx="320" cy="140" r="4" fill="#2563eb"/>
  <circle cx="430" cy="144" r="4" fill="#2563eb"/>
  <circle cx="540" cy="130" r="4" fill="#2563eb"/>
  <circle cx="650" cy="96"  r="4" fill="#2563eb"/>
  <text x="100" y="148" font-size="11" font-weight="600" fill="#1d4ed8" text-anchor="middle">45%</text>
  <text x="210" y="100" font-size="11" font-weight="600" fill="#1d4ed8" text-anchor="middle">70%</text>
  <text x="320" y="130" font-size="11" font-weight="600" fill="#1d4ed8" text-anchor="middle">55%</text>
  <text x="430" y="134" font-size="11" font-weight="600" fill="#1d4ed8" text-anchor="middle">53%</text>
  <text x="540" y="120" font-size="11" font-weight="600" fill="#1d4ed8" text-anchor="middle">60%</text>
  <text x="650" y="86"  font-size="11" font-weight="600" fill="#1d4ed8" text-anchor="middle">77%</text>

  <!-- annotation: batch labels -->
  <text x="100" y="238" font-size="9" fill="#9ca3af" text-anchor="middle">v1.0</text>
  <text x="210" y="238" font-size="9" fill="#9ca3af" text-anchor="middle">v1.1</text>
  <text x="320" y="238" font-size="9" fill="#9ca3af" text-anchor="middle">v1.2</text>
  <text x="430" y="238" font-size="9" fill="#9ca3af" text-anchor="middle">v1.3</text>
  <text x="540" y="238" font-size="9" fill="#9ca3af" text-anchor="middle">v1.5</text>
  <text x="650" y="238" font-size="9" fill="#9ca3af" text-anchor="middle">v1.6</text>
</svg>
